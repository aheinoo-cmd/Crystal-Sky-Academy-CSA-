<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Crystal Sky Academy for course enquiries.">
  <title>Crystal Sky Academy | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <a href="index.html" class="logo">
        <img src="assets/logo-light.png" alt="Crystal Sky Academy Logo">
      </a>
      <nav aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="courses.html">Courses</a></li>
          <li><a href="about.html">About</a></li>
          <li><a class="active" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-banner">
      <div class="container">
        <h1>Contact Us</h1>
        <p></p>
      </div>
    </section>

    <section>
      <div class="container contact-grid">
        <aside class="contact-box">
          <h3>Contact Information</h3>
          <p><strong>Email:</strong> info@crystalskyacademy.com</p>
          <p><strong>Phone:</strong> +95 9 123 456 789</p>
          <p><strong>Address:</strong> Yangon, Myanmar</p>
          <p class="small-note">.</p>
        </aside>

        <div class="form-wrap">
          <form id="contactForm">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="course">Course of Interest</label>
            <select id="course" required>
              <option value="IGCSE">IGCSE</option>
              <option value="Web Development">Web Development</option>
              <option value="Artificial Intelligence">Artificial Intelligence</option>
              <option value="Cyber Security">Cyber Security</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message" placeholder="Write your enquiry here" required></textarea>

            <button type="submit" class="btn btn-primary">Send Enquiry</button>

            <p id="formMessage" style="margin-top:10px;"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-flex">
      <div>© 2026 Crystal Sky Academy</div>
      <div>Learn better with</div>
    </div>
  </footer>

  <script>
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();

      let name = document.getElementById("name").value;
      let course = document.getElementById("course").value;
      let messageBox = document.getElementById("formMessage");

      messageBox.textContent = "✅ Thank you " + name + "! Your enquiry for " + course + " has been sent successfully.";
      messageBox.style.color = "#00aa66";
      messageBox.style.fontWeight = "600";

      this.reset();
    });
  </script>
</body>
</html>
